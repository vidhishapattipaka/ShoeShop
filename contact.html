<!DOCTYPE html>
<html>

<head>
<title>Contact / Delivery Details</title>
<link rel="stylesheet" href="style.css">
</head>

<header>

<div class="container nav">

<h2 class="logo">ShoeVerse</h2>

<nav>
<a href="index.html">Home</a>
<a href="shop.html">Shop</a>
<a href="cart.html">Cart</a>
<a href="contact.html">Contact</a>
</nav>

</div>

</header>


<section class="container contact">

<h2>Delivery Address & Contact Details</h2>

<form class="address-form">

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" placeholder="Enter your email" required>

<label>Phone Number</label>
<input type="tel" placeholder="Enter phone number" required>

<label>Street Address</label>
<input type="text" placeholder="House No / Street Name" required>

<label>City</label>
<input type="text" placeholder="City" required>

<label>State</label>
<input type="text" placeholder="State" required>

<label>Pincode</label>
<input type="text" placeholder="Postal Code" required>

<label>Additional Notes</label>
<textarea placeholder="Landmark or delivery instructions"></textarea>

<button type="submit">Save Address</button>

</form>

</section>

</body>
</html>
